<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>做了么</title>
    <link rel="stylesheet" href="./styles.css?v=20260624-child-delete-only" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Todo & Packing</p>
          <h1>做了么</h1>
        </div>
        <div class="topbar-actions">
          <div class="storage-pill" id="saveStatus">请先登录</div>
          <button class="secondary-btn" id="signOutBtn" type="button" hidden>退出</button>
        </div>
      </header>

      <section class="panel auth-panel" id="authPanel" aria-labelledby="authTitle">
        <div>
          <h2 id="authTitle">登录后云端同步</h2>
          <p>用同一个账号登录，手机和电脑会看到同一份清单。</p>
        </div>
        <form class="auth-form" id="authForm">
          <input id="emailInput" type="email" autocomplete="email" placeholder="邮箱" required />
          <input id="passwordInput" type="password" autocomplete="current-password" placeholder="密码" required />
          <button class="primary-btn" id="signInBtn" type="submit">登录</button>
          <button class="secondary-btn" id="signUpBtn" type="button">注册</button>
        </form>
        <p class="auth-message" id="authMessage"></p>
      </section>

      <nav class="view-tabs" aria-label="功能切换">
        <button class="view-tab active" type="button" data-view-tab="todo" aria-controls="todoPanel" aria-selected="true">
          日常待办
        </button>
        <button class="view-tab" type="button" data-view-tab="packing" aria-controls="packingPanel" aria-selected="false">
          出行清单
        </button>
      </nav>

      <main class="workspace">
        <section class="panel todo-panel" id="todoPanel" data-view-panel="todo" aria-labelledby="todoTitle">
          <div class="section-header">
            <div>
              <h2 id="todoTitle">日常待办</h2>
              <p>记录今天要处理的事项。</p>
            </div>
            <span class="counter" id="todoCounter">0 项</span>
          </div>

          <form class="input-row" id="todoForm">
            <input
              id="todoInput"
              type="text"
              autocomplete="off"
              placeholder="新增待办"
              aria-label="新增待办"
            />
            <button class="primary-btn" type="submit">添加</button>
          </form>

          <ul class="item-list" id="todoList" aria-label="待办列表"></ul>
          <p class="empty-state" id="todoEmpty">还没有待办，先加一件小事吧。</p>
        </section>

        <section class="panel packing-panel" id="packingPanel" data-view-panel="packing" aria-label="出行清单" hidden>
          <div class="packing-layout">
            <aside class="list-sidebar" aria-label="出行清单列表">
              <button class="secondary-btn full-width" id="newListBtn" type="button">新建清单</button>
              <nav class="template-list" id="templateList"></nav>
            </aside>

            <div class="editor">
              <div class="template-actions">
                <h3 id="activeTemplateName">未选择清单</h3>
                <span class="counter" id="packingCounter">0 件</span>
              </div>

              <div class="items-toolbar">
                <form class="input-row" id="packingItemForm">
                  <input
                    id="packingItemInput"
                    type="text"
                    autocomplete="off"
                    placeholder="新增一级目录"
                    aria-label="新增出行一级目录"
                  />
                  <button class="secondary-btn" type="submit">加入</button>
                </form>
              </div>

              <ul class="item-list packing-items" id="packingItems" aria-label="出行物品列表"></ul>
              <p class="empty-state" id="packingEmpty">这个清单还没有物品。</p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <template id="todoItemTemplate">
      <li class="list-item">
        <label class="check-row">
          <input type="checkbox" />
          <span class="item-title"></span>
        </label>
        <div class="item-actions">
          <button class="icon-btn edit-action" type="button" title="编辑">✎</button>
          <button class="icon-btn delete-action" type="button" title="删除">×</button>
        </div>
      </li>
    </template>

    <template id="packingItemTemplate">
      <li class="list-item">
        <label class="check-row">
          <input type="checkbox" />
          <span class="item-title"></span>
        </label>
        <div class="item-actions">
          <button class="icon-btn add-child-action" type="button" title="添加分项">+</button>
          <button class="icon-btn edit-action" type="button" title="编辑">✎</button>
          <button class="icon-btn delete-action" type="button" title="删除">×</button>
        </div>
      </li>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app.js?v=20260624-child-delete-only"></script>
  </body>
</html>
